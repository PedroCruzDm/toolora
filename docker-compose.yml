services:
  mongo:
    image: mongo:7
    container_name: toolora-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: toolora_root
      MONGO_INITDB_ROOT_PASSWORD: toolora_root_secret
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: toolora-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - mongo
    environment:
      PORT: 8080
      MONGODB_URI: mongodb://toolora_root:toolora_root_secret@mongo:27017/toolora?authSource=admin
      JWT_SECRET: toolora-super-secret
    command: ["npm", "run", "dev"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: toolora-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8080

volumes:
  mongo-data:

networks:
  default:
    name: toolora-net