services:
  mysql:
    image: mysql:8.0
    container_name: toolora-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: Mine2026
      MYSQL_DATABASE: toolora
      MYSQL_ROOT_HOST: '%'
      TZ: America/Sao_Paulo
    ports:
     # - "3306:3306"               # Se der erro de porta ocupada, mude para "3307:3306"
      - "3307:3306"             # Alternativa caso 3306 esteja em uso
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/src/database/create.sql:/docker-entrypoint-initdb.d/01-create.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: toolora-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORT: 8080
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: Mine2026
      DB_NAME: toolora
      JWT_SECRET: toolora-super-secret
    command: ["npm", "run", "dev"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: toolora-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8080

volumes:
  mysql-data:

networks:
  default:
    name: toolora-net